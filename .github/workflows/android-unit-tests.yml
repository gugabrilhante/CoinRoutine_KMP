name: Android Unit Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create secrets.properties
        run: |
          echo "API_KEY=\"${{ secrets.API_KEY }}\"" > secrets.properties
          echo "API_BASE_URL=\"${{ secrets.API_BASE_URL }}\"" >> secrets.properties

      - name: Run Android Unit Tests
        run: ./gradlew :composeApp:testDebugUnitTest -PskipUiTests
