name: KMP Unit Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  kmp-tests-and-coverage:
    name: KMP Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create secrets.properties
        run: |
          echo "API_KEY=\"${{ secrets.API_KEY }}\"" > secrets.properties
          echo "API_BASE_URL=\"${{ secrets.API_BASE_URL }}\"" >> secrets.properties

      - name: Run all tests (unit + Compose UI via Robolectric)
        run: ./gradlew :composeApp:testDebugUnitTest

      - name: Generate Coverage Report
        run: ./gradlew :composeApp:koverXmlReportDebug

      - name: Locate and validate Kover XML report
        run: |
          echo "=== Kover report files generated ==="
          find composeApp/build/reports/kover -type f 2>/dev/null | sort || echo "(directory empty or missing)"

          REPORT=$(find composeApp/build/reports/kover -name "*.xml" -type f | head -1)
          if [ -z "$REPORT" ]; then
            echo "ERROR: No XML report found under composeApp/build/reports/kover"
            exit 1
          fi

          LINE_COUNT=$(grep -c '<line' "$REPORT" || true)
          if [ "$LINE_COUNT" -eq 0 ]; then
            echo "ERROR: Report has no line coverage data: $REPORT"
            exit 1
          fi

          echo "Coverage report OK: $REPORT ($LINE_COUNT lines)"
          echo "KOVER_REPORT=$REPORT" >> "$GITHUB_ENV"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.KOVER_REPORT }}
          fail_ci_if_error: true
